#platform configuration web/android/ios
platform=web

# Environment URLs
web.url=https://www.tokopedia.com
api.base.url=https://api.tokopedia.com

# Browser web configuration
browser=chrome
headless=false

# Android Capabilities
android.device.name=Pixel 5
android.automation.name=UiAutomator2
android.app.path=src/test/resources/apps/tokopedia.apk
android.appPackage=com.tokopedia.tkpd
android.appActivity=com.tokopedia.navigation.presentation.activity.NewMainParentActivity
#jika menggunakan real device masukan udid nya
android.udid=

# Appium Server URL
appium.server.url=http://127.0.0.1:4723

# Implicit Wait Timeout (dalam detik)
timeout=10